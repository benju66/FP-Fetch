<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>DocHandler</title>
    <link rel="stylesheet" href="sidebar.css">
</head>
<body>
    <div class="container">
        <header>
            <h2>DocHandler</h2>
            <span class="status-dot"></span>
        </header>

        <div class="form-group">
            <label>Target Project Folder</label>
            <div class="folder-select">
                <span id="currentProjectDisplay">1024 - Orchard Path III</span>
                <button id="changeFolderBtn" class="text-btn">Change</button>
            </div>
        </div>

        <div class="drop-zone" id="dropZone">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                <polyline points="17 8 12 3 7 8"></polyline>
                <line x1="12" y1="3" x2="12" y2="15"></line>
            </svg>
            <p>Drag & Drop Quote Here</p>
            <small>New Outlook or Local File</small>
        </div>

        <div class="form-group">
            <label>Company Name</label>
            <div class="ghost-input-container">
                <span class="ghost-text" id="ghostText"></span>
                <input type="text" id="companyNameInput" autocomplete="off" placeholder="Scanning...">
            </div>
        </div>

        <div class="form-group">
            <label>Scope of Work (SOW)</label>
            <select id="sowSelect" class="styled-select">
                <option value="">Select SOW...</option>
                </select>
        </div>

        <div class="action-panel">
            <button id="saveBtn" class="primary-btn" disabled>Send to Processor</button>
        </div>

        <div id="statusLog" class="status-log">
            Ready for input...
        </div>
    </div>
    <script src="sidebar.js"></script>
</body>
</html>
